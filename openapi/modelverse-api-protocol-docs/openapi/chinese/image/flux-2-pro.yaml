openapi: 3.1.0
x-language: zh-CN
info:
  title: flux-2-pro接口文档
  version: "1.0.0"
  description: |
    这是 ModelVerse 上 `flux-2-pro` 的图片接口文档，说明如何发起图片生成或编辑请求、填写参数、读取结果以及处理错误。
    接口路径包括 `POST /v1/flux-2-pro`。

servers:
  - url: https://api.modelverse.cn
    description: 该模型文档中使用的 ModelVerse API 端点。

tags:
  - name: flux-2-pro
    description: Image generation and image-to-image generation with flux-2-pro.

security:
  - bearerAuth: []

paths:
  /v1/flux-2-pro:
    post:
      tags:
        - flux-2-pro
      operationId: createFlux2ProImageGeneration
      summary: 使用 flux-2-pro 生成图像
      description: |
        调用该模型的图片接口。请求中填写提示词、图片输入和控制参数，响应返回生成或编辑后的图片结果。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Flux2ProImageRequest"
            examples:
              textToImage:
                summary: 生成square PNG image根据text
                value:
                  prompt: A photograph of a red fox in an autumn forest
                  width: 1024
                  height: 1024
              imageToImage:
                summary: 根据 参考图带a seed 生成
                value:
                  prompt: Create a polished product photo while preserving the main subject
                  input_image: "{base64_image_string}"
                  input_image_2: "{base64_image_string}"
                  seed: 123456
                  width: 1024
                  height: 1024
                  safety_tolerance: "2"
                  output_format: png
      responses:
        "200":
          description: 图像生成响应。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flux2ProImageResponse"
              examples:
                generatedImage:
                  summary: 返回 Base64 的生成图像
                  value:
                    createed: 1761283200
                    input_mp: 0
                    output_mp: 2
                    total_pixels: 1048576
                    data:
                      - b64_json: "{image_base64_string}"
                referenceImageResult:
                  summary: 生成的image带输入和输出像素用量
                  value:
                    createed: 1761283260
                    input_mp: 1
                    output_mp: 1
                    total_pixels: 2097152
                    data:
                      - b64_json: "{image_base64_string}"
        "400":
          description: 请求参数无效或图像生成失败。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flux2ProErrorResponse"
              examples:
                invalidWidth:
                  summary: 无效请求参数
                  value:
                    error:
                      message: "width must be greater than or equal to 64 and a multiple of 32"
                      type: invalid_request_error
                      param: width
                      code: param_error
        default:
          description: 错误响应。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flux2ProErrorResponse"
              examples:
                requestError:
                  summary: 请求错误
                  value:
                    error:
                      message: error_message
                      type: error_type
                      param: request_id
                      code: error_code

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: |
        调用该模型的图片接口。请求中填写提示词、图片输入和控制参数，响应返回生成或编辑后的图片结果。
  schemas:
    Flux2ProImageRequest:
      type: object
      additionalProperties: false
      required:
        - prompt
      properties:
        prompt:
          type: string
          minLength: 1
          description: 文本提示词。
        input_image:
          $ref: "#/components/schemas/Flux2ProBase64Image"
        input_image_2:
          $ref: "#/components/schemas/Flux2ProBase64Image"
        input_image_3:
          $ref: "#/components/schemas/Flux2ProBase64Image"
        input_image_4:
          $ref: "#/components/schemas/Flux2ProBase64Image"
        input_image_5:
          $ref: "#/components/schemas/Flux2ProBase64Image"
        input_image_6:
          $ref: "#/components/schemas/Flux2ProBase64Image"
        input_image_7:
          $ref: "#/components/schemas/Flux2ProBase64Image"
        input_image_8:
          $ref: "#/components/schemas/Flux2ProBase64Image"
        seed:
          type: integer
          format: int64
          description: Optional seed for reproducible generation.
        width:
          type: integer
          minimum: 64
          multipleOf: 32
          description: Image width in pixels. The documented constraint is `x >= 64` and a multiple of 32.
        height:
          type: integer
          minimum: 64
          multipleOf: 32
          description: Image height in pixels. The documented constraint is `x >= 64` and a multiple of 32.
        safety_tolerance:
          type: string
          enum:
            - "0"
            - "1"
            - "2"
            - "3"
            - "4"
            - "5"
            - "6"
          description: |
            Tolerance level for input and output moderation. The source
            describes values from 1 to 6 and also states that `0` is the
            strictest and `6` is the least strict.
        output_format:
          type: string
          enum:
            - png
            - jpg
            - jpeg
          default: png
          description: |
            Output image format. The source type column lists `jpeg/png`, and
            the source description lists `png,jpg`.
        webhook_url:
          type: string
          format: uri
          description: Webhook URL used to receive generation results.
        webhook_secret:
          type: string
          description: Webhook secret used to verify webhook requests.

    Flux2ProBase64Image:
      type: string
      contentEncoding: base64
      description: |
        调用该模型的图片接口。请求中填写提示词、图片输入和控制参数，响应返回生成或编辑后的图片结果。
    Flux2ProImageResponse:
      type: object
      additionalProperties: false
      properties:
        createed:
          type: integer
          format: int64
          description: Creation time field as documented in the source response table.
        input_mp:
          type: integer
          minimum: 0
          description: Input image pixels in megapixels, rounded up.
        output_mp:
          type: integer
          minimum: 0
          description: Output image pixels in megapixels, rounded up.
        total_pixels:
          type: integer
          minimum: 0
          description: Total pixels.
        data:
          type: array
          description: Generated image data.
          items:
            $ref: "#/components/schemas/Flux2ProImageData"

    Flux2ProImageData:
      type: object
      additionalProperties: false
      required:
        - b64_json
      properties:
        b64_json:
          type: string
          contentEncoding: base64
          description: Base64-encoded generated image data.

    Flux2ProErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/Flux2ProError"

    Flux2ProError:
      type: object
      additionalProperties: false
      required:
        - message
        - code
      properties:
        message:
          type: string
          description: 错误信息。
        type:
          type: string
          description: 错误类型。
        param:
          type: string
          description: Request parameter related to the error, when available.
        code:
          type: string
          description: 错误码。
