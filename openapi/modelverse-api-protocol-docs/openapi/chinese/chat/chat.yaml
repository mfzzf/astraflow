    AnyJson:
      description: 任意 JSON 值。
      anyOf:
        - type: object
          additionalProperties: true
        - type: array
          items: {}
        - type: string
        - type: number
        - type: integer
        - type: boolean
        - type: "null"

    ChatCompletionResponse:
      oneOf:
        - $ref: "#/components/schemas/ChatCompletionObject"
        - $ref: "#/components/schemas/ChatCompletionChunk"
      description: 聊天补全响应体；非流式返回完整对象，流式返回 chunk 对象。

    ChatCompletionObject:
      type: object
      additionalProperties: true
      required: [id, choices, created, model, object]
      properties:
        id:
          type: string
          description: 聊天补全响应的唯一标识符。
        u_trace_id:
          type: string
          description: 请求 ID。
        choices:
          type: array
          items:
            $ref: "#/components/schemas/ChatCompletionChoice"
        created:
          type: integer
          description: 聊天补全创建时的 Unix 秒级时间戳。
        model:
          type: string
          description: 用于生成此聊天补全的模型。
        object:
          type: string
          enum: [chat.completion, chat.completion.chunk]
          description: 对象类型；非流式通常为 chat.completion，流式通常为 chat.completion.chunk。
        # moderation:
        #   $ref: "#/components/schemas/ModerationEnvelope"
        service_tier:
          type:
            - string
            - "null"
          enum: [auto, default, flex, scale, priority, fast, null]
          description: 服务层级或时延/吞吐偏好。
        # system_fingerprint:
        #   type:
        #     - string
        #     - "null"
        #   description: 模型后端配置指纹。
        # 原字段名：openrouter_metadata
        # routing_metadata:
        #   $ref: "#/components/schemas/RoutingMetadata"
        usage:
          $ref: "#/components/schemas/CompletionUsage"
        # video_result:
        #   type: array
        #   description: 视频生成结果。
        #   items:
        #     $ref: "#/components/schemas/VideoResult"
        # web_search:
        #   type: array
        #   description: 网页搜索来源信息。
        #   items:
        #     $ref: "#/components/schemas/WebSearchResult"
        content_filter:
          type: array
          description: 内容过滤结果。
          items:
            $ref: "#/components/schemas/ContentFilterResult"
        metadata:
          type: object
          additionalProperties: true
          description: 响应附加元数据。
        # input_sensitive:
        #   type: boolean
        #   description: 输入是否命中敏感检测。
        # output_sensitive:
        #   type: boolean
        #   description: 输出是否命中敏感检测。
        # input_sensitive_type:
        #   type: integer
        #   description: 输入敏感检测类型。
        # output_sensitive_type:
        #   type: integer
        #   description: 输出敏感检测类型。
        # output_sensitive_int:
        #   type: integer
        #   description: 输出敏感检测补充类型。
        # base_resp:
        #   $ref: "#/components/schemas/BaseResponse"
        # # 原字段名：openrouter_error_example
        # routing_error_example:
        #   $ref: "#/components/schemas/ErrorResponse"
        # # 原字段名：zhipu_error_example
        # provider_error_example:
        #   $ref: "#/components/schemas/ErrorResponse"
        # # 原字段名：aliyun_stream_chunk_example
        # stream_chunk_example:
        #   $ref: "#/components/schemas/ChatCompletionChunk"
        # # 原字段名：aliyun_stream_usage_chunk_example
        # stream_usage_chunk_example:
        #   $ref: "#/components/schemas/ChatCompletionChunk"

    ChatCompletionChunk:
      type: object
      additionalProperties: true
      required: [id, choices, created, model, object]
      properties:
        id:
          type: string
          description: 与同一次流式响应相关的唯一标识符。
        choices:
          type: array
          items:
            $ref: "#/components/schemas/ChatCompletionChunkChoice"
        created:
          type: integer
          description: chunk 创建时的 Unix 秒级时间戳。
        model:
          type: string
          description: 生成此 chunk 的模型。
        object:
          type: string
          const: chat.completion.chunk
        service_tier:
          type:
            - string
            - "null"
          enum: [auto, default, flex, scale, priority, fast, null]
        system_fingerprint:
          type:
            - string
            - "null"
        usage:
          anyOf:
            - $ref: "#/components/schemas/CompletionUsage"
            - type: "null"

    ChatCompletionChoice:
      type: object
      additionalProperties: true
      required: [index, message]
      properties:
        finish_reason:
          $ref: "#/components/schemas/FinishReason"
        index:
          type: integer
          description: 此选项在 choices 数组中的索引。
        logprobs:
          anyOf:
            - $ref: "#/components/schemas/ChoiceLogprobs"
            - type: "null"
        matched_stop:
          anyOf:
            - type: integer
            - type: string
            - type: "null"
          description: 命中的停止条件。
        message:
          $ref: "#/components/schemas/ChatCompletionResponseMessage"
        moderation_hit_type:
          type:
            - string
            - "null"
          enum: [severe_violation, violence, null]
          description: 内容护栏命中类型。

    ChatCompletionChunkChoice:
      type: object
      additionalProperties: true
      required: [index, delta]
      properties:
        delta:
          $ref: "#/components/schemas/ChatCompletionResponseDelta"
        finish_reason:
          $ref: "#/components/schemas/FinishReason"
        index:
          type: integer
        logprobs:
          anyOf:
            - $ref: "#/components/schemas/ChoiceLogprobs"
            - type: "null"

    FinishReason:
      type:
        - string
        - "null"
      enum:
        - stop
        - length
        - tool_calls
        - content_filter
        - function_call
        - abort
        - error
        - sensitive
        - network_error
        - model_context_window_exceeded
        - null
      description: 生成停止原因；null 常见于流式响应尚未结束时。

    ChatCompletionResponseMessage:
      type: object
      additionalProperties: true
      required: [role]
      properties:
        role:
          type: string
          const: assistant
        name:
          type: string
        reasoning:
          type:
            - string
            - "null"
          description: 推理输出文本。
        reasoning_content:
          type: string
          description: 思考内容片段。
        encrypted_content:
          type: string
          description: 加密思考内容。
        reasoning_details:
          type: array
          items:
            $ref: "#/components/schemas/ReasoningDetail"
        content:
          anyOf:
            - type: string
            - type: "null"
            - type: array
              items:
                $ref: "#/components/schemas/TextContentPart"
        audio_content:
          type: string
          description: 音频内容字符串。
        refusal:
          type:
            - string
            - "null"
          description: 模型拒绝回答的文本。
        images:
          type: array
          items:
            $ref: "#/components/schemas/ResponseImage"
        annotations:
          type: array
          items:
            $ref: "#/components/schemas/ResponseAnnotation"
        audio:
          $ref: "#/components/schemas/ResponseAudio"
        function_call:
          $ref: "#/components/schemas/FunctionCall"
          deprecated: true
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ResponseToolCall"

    ChatCompletionResponseDelta:
      type: object
      additionalProperties: true
      properties:
        role:
          type: string
          const: assistant
        content:
          type:
            - string
            - "null"
        reasoning_content:
          type: string
        encrypted_content:
          type: string
        function_call:
          anyOf:
            - $ref: "#/components/schemas/FunctionCall"
            - type: "null"
          deprecated: true
        audio:
          $ref: "#/components/schemas/ResponseAudio"
        refusal:
          type:
            - string
            - "null"
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ResponseToolCall"

    ReasoningDetail:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          description: 结构化思考片段类型。
        id:
          type: string
        format:
          type: string
        index:
          type: integer
        text:
          type: string

    ResponseImage:
      type: object
      additionalProperties: true
      properties:
        image_url:
          type: object
          additionalProperties: true
          properties:
            url:
              type: string

    ResponseAnnotation:
      type: object
      additionalProperties: true
      required: [type]
      properties:
        type:
          type: string
          const: url_citation
        url_citation:
          type: object
          additionalProperties: true
          properties:
            start_index:
              type: integer
            end_index:
              type: integer
            title:
              type: string
            url:
              type: string

    ResponseAudio:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          description: 音频响应的唯一标识符。
        data:
          type: string
          description: Base64 音频字节或流式音频片段。
        expires_at:
          type: integer
          description: Unix 秒级过期时间戳。
        transcript:
          type: string
          description: 生成音频的转录文本。

    ResponseToolCall:
      oneOf:
        - $ref: "#/components/schemas/ResponseFunctionToolCall"
        - $ref: "#/components/schemas/ResponseCustomToolCall"
        - $ref: "#/components/schemas/ResponseMcpToolCall"

    ResponseFunctionToolCall:
      type: object
      additionalProperties: true
      required: [id, type, function]
      properties:
        id:
          type: string
        type:
          type: string
          const: function
        index:
          type: integer
        function:
          type: object
          additionalProperties: true
          required: [name, arguments]
          properties:
            name:
              type: string
            arguments:
              type: string
              description: 模型生成的 JSON 字符串，调用前需要校验。

    ResponseCustomToolCall:
      type: object
      additionalProperties: true
      required: [id, type, custom]
      properties:
        id:
          type: string
        type:
          type: string
          const: custom
        custom:
          type: object
          additionalProperties: true
          required: [name, input]
          properties:
            name:
              type: string
            input:
              type: string

    ResponseMcpToolCall:
      type: object
      additionalProperties: true
      required: [id, type, mcp]
      properties:
        id:
          type: string
        type:
          type: string
          const: mcp
        mcp:
          type: object
          additionalProperties: true
          properties:
            id:
              type: string
            type:
              type: string
            server_label:
              type: string
            name:
              type: string
            arguments:
              type: string
            output:
              $ref: "#/components/schemas/AnyJson"
            error:
              $ref: "#/components/schemas/AnyJson"
            tools:
              type: array
              items:
                $ref: "#/components/schemas/AnyJson"

    ChoiceLogprobs:
      type: object
      additionalProperties: true
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/TokenLogprob"
        refusal:
          type: array
          items:
            $ref: "#/components/schemas/TokenLogprob"

    TokenLogprob:
      type: object
      additionalProperties: true
      required: [token, logprob]
      properties:
        token:
          type: string
        bytes:
          anyOf:
            - type: array
              items:
                type: integer
            - type: "null"
          description: token 的 UTF-8 字节表示。
        logprob:
          type: number
        top_logprobs:
          type: array
          items:
            $ref: "#/components/schemas/TopLogprob"

    TopLogprob:
      type: object
      additionalProperties: true
      required: [token, logprob]
      properties:
        token:
          type: string
        bytes:
          anyOf:
            - type: array
              items:
                type: integer
            - type: "null"
        logprob:
          type: number

    ModerationEnvelope:
      type: object
      additionalProperties: true
      properties:
        input:
          oneOf:
            - $ref: "#/components/schemas/ModerationResults"
            - $ref: "#/components/schemas/ModerationError"
        output:
          oneOf:
            - $ref: "#/components/schemas/ModerationResults"
            - $ref: "#/components/schemas/ModerationError"

    ModerationResults:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          const: moderation_results
        model:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/ModerationResult"

    ModerationResult:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          const: moderation_result
        model:
          type: string
        flagged:
          type: boolean
        categories:
          type: object
          additionalProperties:
            type: boolean
        category_scores:
          type: object
          additionalProperties:
            type: number
        category_applied_input_types:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    ModerationError:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          const: error
        code:
          type: string
        message:
          type: string

    RoutingMetadata:
      type: object
      additionalProperties: true
      properties:
        attempt:
          type: integer
        attempts:
          type: array
          items:
            $ref: "#/components/schemas/RoutingAttempt"
        endpoints:
          type: object
          additionalProperties: true
          properties:
            available:
              type: array
              items:
                $ref: "#/components/schemas/RoutingEndpoint"
            total:
              type: integer
        is_byok:
          type: boolean
        params:
          type: object
          additionalProperties: true
          properties:
            quality_floor:
              type: number
            throughput_floor:
              type: number
            version_group:
              type: string
        pipeline:
          type: array
          items:
            $ref: "#/components/schemas/RoutingPipelineStep"
        region:
          anyOf:
            - type: string
            - type: "null"
        requested:
          type: string
        strategy:
          type: string
          enum: [direct, auto, free, latest, alias, fallback, pareto, bodybuilder, fusion]
        summary:
          type: string

    RoutingAttempt:
      type: object
      additionalProperties: true
      properties:
        model:
          type: string
        provider:
          type: string
        status:
          type: integer

    RoutingEndpoint:
      type: object
      additionalProperties: true
      properties:
        model:
          type: string
        provider:
          type: string
        selected:
          type: boolean

    RoutingPipelineStep:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
        name:
          type: string
        summary:
          type: string
        cost_usd:
          type: number
        data:
          $ref: "#/components/schemas/AnyJson"

    CompletionUsage:
      type: object
      additionalProperties: true
      properties:
        completion_tokens:
          type: integer
          description: 生成内容使用的 token 数。
        prompt_tokens:
          type: integer
          description: 提示词使用的 token 数。
        reasoning_tokens:
          type: integer
          description: 思考内容消耗的 token 数。
        total_tokens:
          type: integer
          description: 请求总 token 数。
        # total_characters:
