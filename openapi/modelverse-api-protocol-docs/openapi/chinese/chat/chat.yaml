        role:
          type: string
          enum: [assistant, user, history]
        level:
          type: integer
          minimum: 0
          maximum: 3

    BaseResponse:
      type: object
      additionalProperties: true
      properties:
        status_code:
          type: integer
          description: 业务状态码。
        status_msg:
          type: string
          description: 错误详情或状态说明。

    ErrorResponse:
