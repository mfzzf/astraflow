#       type: object
#       additionalProperties: true
#       properties:
#         allow_fallbacks:
#           type:
#             - boolean
#             - "null"
#           default: true
#         data_collection:
#           type:
#             - string
#             - "null"
#           enum: [allow, deny, null]
#         order:
#           type:
#             - array
#             - "null"
#           items:
#             type: string
#         only:
#           type:
#             - array
#             - "null"
#           items:
#             type: string
#         ignore:
#           type:
#             - array
#             - "null"
#           items:
#             type: string
#         require_parameters:
#           type:
#             - boolean
#             - "null"
