          items:
            "$ref": "#/components/schemas/AllowedCaller"
          title: "允许调用方"
          type: "array"
        defer_loading:
          description: "为 true 时，工具不会包含在初始系统提示词中，只会在工具搜索通过 tool_reference 返回时加载。"
          title: "延迟加载"
          type: "boolean"
        input_examples:
          items:
            additionalProperties:
              "$ref": "#/components/schemas/JsonValue"
            type: "object"
          title: "输入示例"
          type: "array"
      required:
        - "name"
        - "input_schema"
      title: "工具"
      type: "object"
