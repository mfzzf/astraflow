    ThinkingConfigParam:
      description: "启用 Claude 扩展思考的配置。\n\n启用后，响应会包含 `thinking` 内容块，展示 Claude 在最终答案前的思考过程。至少需要 1,024 Token 预算，并计入 `max_tokens` 限制。\n\n详情请参阅[扩展思考](https://docs.claude.com/en/docs/build-with-claude/extended-thinking)。"
