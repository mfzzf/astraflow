              -
                "$ref": "#/components/schemas/WebFetchTool_20260309"
              -
                "$ref": "#/components/schemas/ToolSearchToolBM25_20251119"
              -
                "$ref": "#/components/schemas/ToolSearchToolRegex_20251119"
          title: "工具"
