        completion_tokens_details:
          $ref: "#/components/schemas/CompletionTokensDetails"
        prompt_tokens_details:
          $ref: "#/components/schemas/PromptTokensDetails"

    CompletionTokensDetails:
      type: object
      additionalProperties: true
      properties:
        accepted_prediction_tokens:
          type: integer
        audio_tokens:
          type: integer
        reasoning_tokens:
          type: integer
        text_tokens:
          type: integer
        rejected_prediction_tokens:
          type: integer

    PromptTokensDetails:
      type: object
      additionalProperties: true
      properties:
        audio_tokens:
          type: integer
        audio_cached_tokens:
          type: integer
        text_tokens:
          type: integer
        video_tokens:
          type: integer
        image_tokens:
          type: integer
        cache_write_tokens:
          type: integer
        cached_tokens:
          type: integer
        cache_creation:
          type: object
          additionalProperties: true
          properties:
            ephemeral_5m_input_tokens:
              type: integer
            cache_creation_input_tokens:
              type: integer
            cache_type:
              type: string
              const: ephemeral

