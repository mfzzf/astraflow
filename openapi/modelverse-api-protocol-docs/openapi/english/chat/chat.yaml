    AnyJson:
      description: Any JSON value.
      anyOf:
        - type: object
          additionalProperties: true
        - type: array
          items: {}
        - type: string
        - type: number
        - type: integer
        - type: boolean
        - type: "null"

    ChatCompletionResponse:
      oneOf:
        - $ref: "#/components/schemas/ChatCompletionObject"
        - $ref: "#/components/schemas/ChatCompletionChunk"
      description: Chat completion response body. Non-streaming responses return a full object; streaming responses return chunk objects.

    ChatCompletionObject:
      type: object
      additionalProperties: true
      required: [id, choices, created, model, object]
      properties:
        id:
          type: string
          description: Unique identifier for the chat completion response.
        u_trace_id:
          type: string
          description: Request ID.
        choices:
          type: array
          items:
            $ref: "#/components/schemas/ChatCompletionChoice"
        created:
          type: integer
          description: Unix timestamp in seconds when the chat completion was created.
        model:
          type: string
          description: Model used to generate this chat completion.
        object:
          type: string
          enum: [chat.completion, chat.completion.chunk]
          description: Object type. Non-streaming responses are usually chat.completion; streaming responses are usually chat.completion.chunk.
        # moderation:
        #   $ref: "#/components/schemas/ModerationEnvelope"
        service_tier:
          type:
            - string
            - "null"
          enum: [auto, default, flex, scale, priority, fast, null]
          description: Service tier or latency/throughput preference.
        # system_fingerprint:
        #   type:
        #     - string
        #     - "null"
        #   description: Model backend configuration fingerprint.
        # Original field name: openrouter_metadata
        # routing_metadata:
        #   $ref: "#/components/schemas/RoutingMetadata"
        usage:
          $ref: "#/components/schemas/CompletionUsage"
        # video_result:
        #   type: array
        #   description: Video generation result.
        #   items:
        #     $ref: "#/components/schemas/VideoResult"
        # web_search:
        #   type: array
        #   description: Web search source information.
        #   items:
        #     $ref: "#/components/schemas/WebSearchResult"
        content_filter:
          type: array
          description: Content filtering results.
          items:
            $ref: "#/components/schemas/ContentFilterResult"
        metadata:
          type: object
          additionalProperties: true
          description: Additional response metadata.
        # input_sensitive:
        #   type: boolean
        #   description: Whether the input triggered sensitive-content detection.
        # output_sensitive:
        #   type: boolean
        #   description: Whether the output triggered sensitive-content detection.
        # input_sensitive_type:
        #   type: integer
        #   description: Input sensitive-content detection type.
        # output_sensitive_type:
        #   type: integer
        #   description: Output sensitive-content detection type.
        # output_sensitive_int:
        #   type: integer
        #   description: Additional output sensitive-content detection type.
        # base_resp:
        #   $ref: "#/components/schemas/BaseResponse"
        # # Original field name: openrouter_error_example
        # routing_error_example:
        #   $ref: "#/components/schemas/ErrorResponse"
        # # Original field name: zhipu_error_example
        # provider_error_example:
        #   $ref: "#/components/schemas/ErrorResponse"
        # # Original field name: aliyun_stream_chunk_example
        # stream_chunk_example:
        #   $ref: "#/components/schemas/ChatCompletionChunk"
        # # Original field name: aliyun_stream_usage_chunk_example
        # stream_usage_chunk_example:
        #   $ref: "#/components/schemas/ChatCompletionChunk"

    ChatCompletionChunk:
      type: object
      additionalProperties: true
      required: [id, choices, created, model, object]
      properties:
        id:
          type: string
          description: Unique identifier associated with the same streaming response.
        choices:
          type: array
          items:
            $ref: "#/components/schemas/ChatCompletionChunkChoice"
        created:
          type: integer
          description: Unix timestamp in seconds when the chunk was created.
        model:
          type: string
          description: Model that generated this chunk.
        object:
          type: string
          const: chat.completion.chunk
        service_tier:
          type:
            - string
            - "null"
          enum: [auto, default, flex, scale, priority, fast, null]
        system_fingerprint:
          type:
            - string
            - "null"
        usage:
          anyOf:
            - $ref: "#/components/schemas/CompletionUsage"
            - type: "null"

    ChatCompletionChoice:
      type: object
      additionalProperties: true
      required: [index, message]
      properties:
        finish_reason:
          $ref: "#/components/schemas/FinishReason"
        index:
          type: integer
          description: Index of this choice in the choices array.
        logprobs:
          anyOf:
            - $ref: "#/components/schemas/ChoiceLogprobs"
            - type: "null"
        matched_stop:
          anyOf:
            - type: integer
            - type: string
            - type: "null"
          description: Matched stop condition.
        message:
          $ref: "#/components/schemas/ChatCompletionResponseMessage"
        moderation_hit_type:
          type:
            - string
            - "null"
          enum: [severe_violation, violence, null]
          description: Content guardrail hit type.

    ChatCompletionChunkChoice:
      type: object
      additionalProperties: true
      required: [index, delta]
      properties:
        delta:
          $ref: "#/components/schemas/ChatCompletionResponseDelta"
        finish_reason:
          $ref: "#/components/schemas/FinishReason"
        index:
          type: integer
        logprobs:
          anyOf:
            - $ref: "#/components/schemas/ChoiceLogprobs"
            - type: "null"

    FinishReason:
      type:
        - string
        - "null"
      enum:
        - stop
        - length
        - tool_calls
        - content_filter
        - function_call
        - abort
        - error
        - sensitive
        - network_error
        - model_context_window_exceeded
        - null
      description: Reason generation stopped. null is common when a streaming response has not finished yet.

    ChatCompletionResponseMessage:
      type: object
      additionalProperties: true
      required: [role]
      properties:
        role:
          type: string
          const: assistant
        name:
          type: string
        reasoning:
          type:
            - string
            - "null"
          description: Reasoning output text.
        reasoning_content:
          type: string
          description: Thinking content fragment.
        encrypted_content:
          type: string
          description: Encrypted thinking content.
        reasoning_details:
          type: array
          items:
            $ref: "#/components/schemas/ReasoningDetail"
        content:
          anyOf:
            - type: string
            - type: "null"
            - type: array
              items:
                $ref: "#/components/schemas/TextContentPart"
        audio_content:
          type: string
          description: Audio content string.
        refusal:
          type:
            - string
            - "null"
          description: Text of the model refusal.
        images:
          type: array
          items:
            $ref: "#/components/schemas/ResponseImage"
        annotations:
          type: array
          items:
            $ref: "#/components/schemas/ResponseAnnotation"
        audio:
          $ref: "#/components/schemas/ResponseAudio"
        function_call:
          $ref: "#/components/schemas/FunctionCall"
          deprecated: true
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ResponseToolCall"

    ChatCompletionResponseDelta:
      type: object
      additionalProperties: true
      properties:
        role:
          type: string
          const: assistant
        content:
          type:
            - string
            - "null"
        reasoning_content:
          type: string
        encrypted_content:
          type: string
        function_call:
          anyOf:
            - $ref: "#/components/schemas/FunctionCall"
            - type: "null"
          deprecated: true
        audio:
          $ref: "#/components/schemas/ResponseAudio"
        refusal:
          type:
            - string
            - "null"
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ResponseToolCall"

    ReasoningDetail:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          description: Structured thinking fragment type.
        id:
          type: string
        format:
          type: string
        index:
          type: integer
        text:
          type: string

    ResponseImage:
      type: object
      additionalProperties: true
      properties:
        image_url:
          type: object
          additionalProperties: true
          properties:
            url:
              type: string

    ResponseAnnotation:
      type: object
      additionalProperties: true
      required: [type]
      properties:
        type:
          type: string
          const: url_citation
        url_citation:
          type: object
          additionalProperties: true
          properties:
            start_index:
              type: integer
            end_index:
              type: integer
            title:
              type: string
            url:
              type: string

    ResponseAudio:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          description: Unique identifier for the audio response.
        data:
          type: string
          description: Base64 audio bytes or streaming audio fragment.
        expires_at:
          type: integer
          description: Unix expiration timestamp in seconds.
        transcript:
          type: string
          description: Transcript text generated for the audio.

    ResponseToolCall:
      oneOf:
        - $ref: "#/components/schemas/ResponseFunctionToolCall"
        - $ref: "#/components/schemas/ResponseCustomToolCall"
        - $ref: "#/components/schemas/ResponseMcpToolCall"

    ResponseFunctionToolCall:
      type: object
      additionalProperties: true
      required: [id, type, function]
      properties:
        id:
          type: string
        type:
          type: string
          const: function
        index:
          type: integer
        function:
          type: object
          additionalProperties: true
          required: [name, arguments]
          properties:
            name:
              type: string
            arguments:
              type: string
              description: Model-generated JSON string. Validate it before calling.

    ResponseCustomToolCall:
      type: object
      additionalProperties: true
      required: [id, type, custom]
      properties:
        id:
          type: string
        type:
          type: string
          const: custom
        custom:
          type: object
          additionalProperties: true
          required: [name, input]
          properties:
            name:
              type: string
            input:
              type: string

    ResponseMcpToolCall:
      type: object
      additionalProperties: true
      required: [id, type, mcp]
      properties:
        id:
          type: string
        type:
          type: string
          const: mcp
        mcp:
          type: object
          additionalProperties: true
          properties:
            id:
              type: string
            type:
              type: string
            server_label:
              type: string
            name:
              type: string
            arguments:
              type: string
            output:
              $ref: "#/components/schemas/AnyJson"
            error:
              $ref: "#/components/schemas/AnyJson"
            tools:
              type: array
              items:
                $ref: "#/components/schemas/AnyJson"

    ChoiceLogprobs:
      type: object
      additionalProperties: true
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/TokenLogprob"
        refusal:
          type: array
          items:
            $ref: "#/components/schemas/TokenLogprob"

    TokenLogprob:
      type: object
      additionalProperties: true
      required: [token, logprob]
      properties:
        token:
          type: string
        bytes:
          anyOf:
            - type: array
              items:
                type: integer
            - type: "null"
          description: UTF-8 byte representation of the token.
        logprob:
          type: number
        top_logprobs:
          type: array
          items:
            $ref: "#/components/schemas/TopLogprob"

    TopLogprob:
      type: object
      additionalProperties: true
      required: [token, logprob]
      properties:
        token:
          type: string
        bytes:
          anyOf:
            - type: array
              items:
                type: integer
            - type: "null"
        logprob:
          type: number

    ModerationEnvelope:
      type: object
      additionalProperties: true
      properties:
        input:
          oneOf:
            - $ref: "#/components/schemas/ModerationResults"
            - $ref: "#/components/schemas/ModerationError"
        output:
          oneOf:
            - $ref: "#/components/schemas/ModerationResults"
            - $ref: "#/components/schemas/ModerationError"

    ModerationResults:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          const: moderation_results
        model:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/ModerationResult"

    ModerationResult:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          const: moderation_result
        model:
          type: string
        flagged:
          type: boolean
        categories:
          type: object
          additionalProperties:
            type: boolean
        category_scores:
          type: object
          additionalProperties:
            type: number
        category_applied_input_types:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    ModerationError:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          const: error
        code:
          type: string
        message:
          type: string

    RoutingMetadata:
      type: object
      additionalProperties: true
      properties:
        attempt:
          type: integer
        attempts:
          type: array
          items:
            $ref: "#/components/schemas/RoutingAttempt"
        endpoints:
          type: object
          additionalProperties: true
          properties:
            available:
              type: array
              items:
                $ref: "#/components/schemas/RoutingEndpoint"
            total:
              type: integer
        is_byok:
          type: boolean
        params:
          type: object
          additionalProperties: true
          properties:
            quality_floor:
              type: number
            throughput_floor:
              type: number
            version_group:
              type: string
        pipeline:
          type: array
          items:
            $ref: "#/components/schemas/RoutingPipelineStep"
        region:
          anyOf:
            - type: string
            - type: "null"
        requested:
          type: string
        strategy:
          type: string
          enum: [direct, auto, free, latest, alias, fallback, pareto, bodybuilder, fusion]
        summary:
          type: string

    RoutingAttempt:
      type: object
      additionalProperties: true
      properties:
        model:
          type: string
        provider:
          type: string
        status:
          type: integer

    RoutingEndpoint:
      type: object
      additionalProperties: true
      properties:
        model:
          type: string
        provider:
          type: string
        selected:
          type: boolean

    RoutingPipelineStep:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
        name:
          type: string
        summary:
          type: string
        cost_usd:
          type: number
        data:
          $ref: "#/components/schemas/AnyJson"

    CompletionUsage:
      type: object
      additionalProperties: true
      properties:
        completion_tokens:
          type: integer
          description: Number of tokens used by generated content.
        prompt_tokens:
          type: integer
          description: Number of tokens used by the prompt.
        reasoning_tokens:
          type: integer
          description: Number of tokens consumed by thinking content.
        total_tokens:
          type: integer
          description: Total number of tokens in the request.
        # total_characters:
        #   type: integer
        #   description: Character count for the request or response.
