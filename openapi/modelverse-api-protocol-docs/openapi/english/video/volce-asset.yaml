openapi: 3.1.0
x-language: en-US
info:
  title: ModelVerse Volce Asset Management API
  version: "1.0.0"
  description: |
    ModelVerse management API for Volcengine Ark private assets, converted from

    This document describes真人 verification sessions, asset group management,
    and asset management. It is a management API, not a generative task model
    API.

servers:
  - url: https://api.modelverse.cn
    description: ModelVerse China mainland endpoint shown in the source document.

tags:
  - name: Volce Asset Management
    description: Manage Volce private asset verification sessions, asset groups, and assets.

security:
  - bearerAuth: []

paths:
  /v1/volce-asset/visual-validate/sessions:
    get:
      tags:
        - Volce Asset Management
      operationId: createVolceAssetVisualValidateSession
      summary: Create a真人 verification session
      description: |
        Create a真人 verification session. Open the returned `h5_link` in a
        browser so the real user can complete verification. Use the returned
        `bearer_token` to query the verification result.
      x-codeSamples:
        - lang: curl
          source: |
            curl --location "$ENDPOINT/v1/volce-asset/visual-validate/sessions" \
              --header "Authorization: Bearer $MODELVERSE_API_KEY"
      responses:
        "200":
          description: Verification session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolceAssetVisualValidateSessionResponse"
              examples:
                created:
                  summary: Verification session credentials
                  value:
                    bearer_token: 2b7b3f8e-0f7d-4d4c-8f0f-xxxxxxxxxxxx
                    h5_link: https://example.com/visual-validate?token=xxxx
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/Error"

  /v1/volce-asset/visual-validate/result:
    post:
      tags:
        - Volce Asset Management
      operationId: queryVolceAssetVisualValidateResult
      summary: Query真人 verification result
      description: Query the status and asset group ID for a真人 verification session.
      x-codeSamples:
        - lang: curl
          source: |
            curl --location "$ENDPOINT/v1/volce-asset/visual-validate/result" \
              --header "Authorization: Bearer $MODELVERSE_API_KEY" \
              --header "Content-Type: application/json" \
              --data '{
                "bearer_token": "2b7b3f8e-0f7d-4d4c-8f0f-xxxxxxxxxxxx"
              }'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolceAssetVisualValidateResultRequest"
            examples:
              by_bearer_token:
                summary: Query by session bearer token
                value:
                  bearer_token: 2b7b3f8e-0f7d-4d4c-8f0f-xxxxxxxxxxxx
      responses:
        "200":
          description: Verification session status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolceAssetVisualValidateResultResponse"
              examples:
                group_ready:
                  summary: Verification passed and asset group is ready
                  value:
                    status: group_ready
                    group_id: group-20260331145705-xxxxx
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/Error"

  /v1/volce-asset/groups/list:
    post:
      tags:
        - Volce Asset Management
      operationId: listVolceAssetGroups
      summary: List asset groups
      description: Query the asset groups visible to the current API key.
      x-codeSamples:
        - lang: curl
          source: |
            curl --location "$ENDPOINT/v1/volce-asset/groups/list" \
              --header "Authorization: Bearer $MODELVERSE_API_KEY" \
              --header "Content-Type: application/json" \
              --data '{
                "filter": {
                  "group_type": "LivenessFace"
                },
                "page_number": 1,
                "page_size": 10
              }'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListVolceAssetGroupsRequest"
            examples:
              liveness_face_groups:
                summary: List真人 asset groups
                value:
                  filter:
                    group_type: LivenessFace
                  page_number: 1
                  page_size: 10
      responses:
        "200":
          description: Asset group list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVolceAssetGroupsResponse"
              examples:
                one_group:
                  summary: One真人 asset group
                  value:
                    items:
                      - id: group-20260331145705-xxxxx
                        name: 真人素材组
                        description: 用于数字人生成
                        group_type: LivenessFace
                        project_name: default
                        create_time: "2026-03-31T06:57:05Z"
                        update_time: "2026-03-31T06:57:05Z"
                    total_count: 1
                    page_number: 1
                    page_size: 10
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/Error"

  /v1/volce-asset/groups/get:
    post:
      tags:
        - Volce Asset Management
      operationId: getVolceAssetGroup
      summary: Get asset group details
      description: Query one asset group by asset group ID.
      x-codeSamples:
        - lang: curl
          source: |
            curl --location "$ENDPOINT/v1/volce-asset/groups/get" \
              --header "Authorization: Bearer $MODELVERSE_API_KEY" \
              --header "Content-Type: application/json" \
              --data '{
                "id": "group-20260331145705-xxxxx"
              }'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolceAssetGroupIdRequest"
            examples:
              by_group_id:
                summary: Query group by ID
                value:
                  id: group-20260331145705-xxxxx
      responses:
        "200":
          description: Asset group details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolceAssetGroup"
              examples:
                liveness_face_group:
                  summary: 真人 asset group
                  value:
                    id: group-20260331145705-xxxxx
                    name: 真人素材组
                    description: 用于数字人生成
                    group_type: LivenessFace
                    project_name: default
                    create_time: "2026-03-31T06:57:05Z"
                    update_time: "2026-03-31T06:57:05Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/Error"

  /v1/volce-asset/groups/update:
    post:
      tags:
        - Volce Asset Management
      operationId: updateVolceAssetGroup
      summary: Update an asset group
      description: Update the name or description of an asset group. At least one of `name` or `description` is required.
      x-codeSamples:
        - lang: curl
          source: |
            curl --location "$ENDPOINT/v1/volce-asset/groups/update" \
              --header "Authorization: Bearer $MODELVERSE_API_KEY" \
              --header "Content-Type: application/json" \
              --data '{
                "id": "group-20260331145705-xxxxx",
                "name": "真人素材组",
                "description": "用于数字人生成"
              }'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVolceAssetGroupRequest"
            examples:
              rename_group:
                summary: Update group name and description
                value:
                  id: group-20260331145705-xxxxx
                  name: 真人素材组
                  description: 用于数字人生成
      responses:
        "200":
          description: Asset group updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolceAssetGroupIdResponse"
              examples:
                updated:
                  summary: Updated group ID
                  value:
                    id: group-20260331145705-xxxxx
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/Error"

  /v1/volce-asset/groups/delete:
    post:
      tags:
        - Volce Asset Management
      operationId: deleteVolceAssetGroup
      summary: Delete an asset group
      description: |
        Delete one asset group. Deleting an asset group also deletes every
        asset in the group, and the operation cannot be reversed.
      x-codeSamples:
        - lang: curl
          source: |
            curl --location "$ENDPOINT/v1/volce-asset/groups/delete" \
              --header "Authorization: Bearer $MODELVERSE_API_KEY" \
              --header "Content-Type: application/json" \
              --data '{
                "id": "group-20260331145705-xxxxx"
              }'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolceAssetGroupIdRequest"
            examples:
              by_group_id:
                summary: Delete group by ID
                value:
                  id: group-20260331145705-xxxxx
      responses:
        "200":
          description: Asset group deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyObject"
              examples:
                deleted:
                  summary: Empty success response
                  value: {}
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/Error"

  /v1/volce-asset/assets/create:
    post:
      tags:
        - Volce Asset Management
      operationId: createVolceAssetAsset
      summary: Create an asset
      description: |
        Create an asset in an asset group using a publicly reachable URL.
        Successful submission means the asset was accepted for asynchronous
        processing. Query asset details or list assets until `status` becomes
        `Active` before using the asset.
      x-codeSamples:
        - lang: curl
          source: |
            curl --location "$ENDPOINT/v1/volce-asset/assets/create" \
              --header "Authorization: Bearer $MODELVERSE_API_KEY" \
              --header "Content-Type: application/json" \
              --data '{
                "group_id": "group-20260331145705-xxxxx",
                "url": "https://example.com/image.jpg",
                "name": "test-image",
                "asset_type": "Image"
              }'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVolceAssetAssetRequest"
            examples:
              image_asset:
                summary: Create an image asset
                value:
                  group_id: group-20260331145705-xxxxx
                  url: https://example.com/image.jpg
                  name: test-image
                  asset_type: Image
      responses:
        "200":
          description: Asset submitted for processing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolceAssetAssetIdResponse"
              examples:
                created:
                  summary: Created asset ID
                  value:
                    id: Asset-20260331150000-xxxxx
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/Error"

  /v1/volce-asset/assets/list:
    post:
      tags:
        - Volce Asset Management
      operationId: listVolceAssetAssets
      summary: List assets
      description: Query assets visible to the current API key.
      x-codeSamples:
        - lang: curl
          source: |
            curl --location "$ENDPOINT/v1/volce-asset/assets/list" \
              --header "Authorization: Bearer $MODELVERSE_API_KEY" \
              --header "Content-Type: application/json" \
              --data '{
                "filter": {
                  "group_ids": ["group-20260331145705-xxxxx"],
                  "statuses": ["Active"]
                },
                "page_number": 1,
                "page_size": 10
              }'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListVolceAssetAssetsRequest"
            examples:
              active_assets:
                summary: List active assets in one group
                value:
                  filter:
                    group_ids:
                      - group-20260331145705-xxxxx
                    statuses:
                      - Active
                  page_number: 1
                  page_size: 10
      responses:
        "200":
          description: Asset list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVolceAssetAssetsResponse"
              examples:
                one_image_asset:
                  summary: One active image asset
                  value:
                    items:
                      - id: Asset-20260331150000-xxxxx
                        name: test-image
                        url: https://example.com/asset-url
                        group_id: group-20260331145705-xxxxx
                        asset_type: Image
                        status: Active
                        error:
                          code: ""
                          message: ""
                        project_name: default
                        create_time: "2026-03-31T07:00:00Z"
                        update_time: "2026-03-31T07:00:30Z"
                    total_count: 1
                    page_number: 1
                    page_size: 10
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/Error"

  /v1/volce-asset/assets/get:
    post:
      tags:
        - Volce Asset Management
      operationId: getVolceAssetAsset
      summary: Get asset details
      description: Query one asset by asset ID.
      x-codeSamples:
        - lang: curl
          source: |
            curl --location "$ENDPOINT/v1/volce-asset/assets/get" \
              --header "Authorization: Bearer $MODELVERSE_API_KEY" \
              --header "Content-Type: application/json" \
              --data '{
                "id": "Asset-20260331150000-xxxxx"
              }'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolceAssetAssetIdRequest"
            examples:
              by_asset_id:
                summary: Query asset by ID
                value:
                  id: Asset-20260331150000-xxxxx
      responses:
        "200":
          description: Asset details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolceAssetAsset"
              examples:
                image_asset:
                  summary: Active image asset
                  value:
                    id: Asset-20260331150000-xxxxx
                    name: test-image
                    url: https://example.com/asset-url
                    group_id: group-20260331145705-xxxxx
                    asset_type: Image
                    status: Active
                    error:
                      code: ""
                      message: ""
                    project_name: default
                    create_time: "2026-03-31T07:00:00Z"
                    update_time: "2026-03-31T07:00:30Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/Error"

  /v1/volce-asset/assets/update:
    post:
      tags:
        - Volce Asset Management
      operationId: updateVolceAssetAsset
      summary: Update an asset
      description: Update an asset name. The source document currently only documents updating `name`.
      x-codeSamples:
        - lang: curl
          source: |
            curl --location "$ENDPOINT/v1/volce-asset/assets/update" \
              --header "Authorization: Bearer $MODELVERSE_API_KEY" \
              --header "Content-Type: application/json" \
              --data '{
                "id": "Asset-20260331150000-xxxxx",
                "name": "new-name"
              }'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVolceAssetAssetRequest"
            examples:
              rename_asset:
                summary: Update asset name
                value:
                  id: Asset-20260331150000-xxxxx
                  name: new-name
      responses:
        "200":
          description: Asset updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolceAssetAssetIdResponse"
              examples:
                updated:
                  summary: Updated asset ID
                  value:
                    id: Asset-20260331150000-xxxxx
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/Error"

  /v1/volce-asset/assets/delete:
    post:
      tags:
        - Volce Asset Management
      operationId: deleteVolceAssetAsset
      summary: Delete an asset
      description: Delete one asset by asset ID.
      x-codeSamples:
        - lang: curl
          source: |
            curl --location "$ENDPOINT/v1/volce-asset/assets/delete" \
              --header "Authorization: Bearer $MODELVERSE_API_KEY" \
              --header "Content-Type: application/json" \
              --data '{
                "id": "Asset-20260331150000-xxxxx"
              }'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolceAssetAssetIdRequest"
            examples:
              by_asset_id:
                summary: Delete asset by ID
                value:
                  id: Asset-20260331150000-xxxxx
      responses:
        "200":
          description: Asset deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyObject"
              examples:
                deleted:
                  summary: Empty success response
                  value: {}
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  responses:
    BadRequest:
      description: Invalid request parameters or unsupported operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            param_error:
              summary: Parameter error
              value:
                error:
                  message: Invalid param
                  type: invalid_request_error
                  code: param_error
                  param: id
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            auth_error:
              summary: Authorization failed
              value:
                error:
                  message: Validate Certification failed
                  type: invalid_request_error
                  code: auth_error
                  param: null
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            internal_error:
              summary: Internal service error
              value:
                error:
                  message: Internal error
                  type: internal_error
                  code: internal_error
                  param: null

  schemas:
    VolceAssetVisualValidateSessionResponse:
      type: object
      additionalProperties: false
      required:
        - bearer_token
        - h5_link
      properties:
        bearer_token:
          type: string
          description: Query credential for this verification session. It is valid for about 30 minutes.
          examples:
            - 2b7b3f8e-0f7d-4d4c-8f0f-xxxxxxxxxxxx
        h5_link:
          type: string
          format: uri
          description: H5 link that the business should direct the user to open for真人 verification.
          examples:
            - https://example.com/visual-validate?token=xxxx

    VolceAssetVisualValidateResultRequest:
      type: object
      additionalProperties: false
      required:
        - bearer_token
      properties:
        bearer_token:
          type: string
          description: Query credential returned by the create verification session API.
          examples:
            - 2b7b3f8e-0f7d-4d4c-8f0f-xxxxxxxxxxxx

    VolceAssetVisualValidateResultResponse:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - created
            - group_ready
            - failed
            - expired
          description: Verification session status.
        group_id:
          type: string
          description: Asset group ID returned after真人 verification passes and the group is ready.
          examples:
            - group-20260331145705-xxxxx

    ListVolceAssetGroupsRequest:
      type: object
      additionalProperties: false
      properties:
        filter:
          $ref: "#/components/schemas/VolceAssetGroupFilter"
        page_number:
          type: integer
          minimum: 1
          default: 1
          description: Page number, starting from 1.
        page_size:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
          description: Number of items per page.

    VolceAssetGroupFilter:
      type: object
      additionalProperties: false
      properties:
        group_ids:
          type: array
          description: Asset group IDs. Empty means all asset groups visible to the current account.
          items:
            type: string
          examples:
            - - group-20260331145705-xxxxx
        group_type:
          $ref: "#/components/schemas/VolceAssetGroupType"
        name:
          type: string
          description: Asset group name. Supports fuzzy matching.
          examples:
            - test

    ListVolceAssetGroupsResponse:
      type: object
      additionalProperties: false
      required:
        - items
        - total_count
        - page_number
        - page_size
      properties:
        items:
          type: array
          description: Asset group list.
          items:
            $ref: "#/components/schemas/VolceAssetGroup"
        total_count:
          type: integer
          description: Total number of asset groups that match the filter.
        page_number:
          type: integer
          description: Current page number.
        page_size:
          type: integer
          description: Number of items per page.

    VolceAssetGroup:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - description
        - group_type
        - project_name
        - create_time
        - update_time
      properties:
        id:
          type: string
          description: Asset group ID.
          examples:
            - group-20260331145705-xxxxx
        name:
          type: string
          description: Asset group name.
          examples:
            - 真人素材组
        description:
          type: string
          description: Asset group description.
          examples:
            - 用于数字人生成
        group_type:
          $ref: "#/components/schemas/VolceAssetGroupType"
        project_name:
          type: string
          description: Project that owns the resource.
          examples:
            - default
        create_time:
          type: string
          format: date-time
          description: Creation time.
          examples:
            - "2026-03-31T06:57:05Z"
        update_time:
          type: string
          format: date-time
          description: Last update time.
          examples:
            - "2026-03-31T06:57:05Z"

    VolceAssetGroupIdRequest:
      type: object
      additionalProperties: false
      required:
        - id
      properties:
        id:
          type: string
          description: Asset group ID.
          examples:
            - group-20260331145705-xxxxx

    VolceAssetGroupIdResponse:
      type: object
      additionalProperties: false
      required:
        - id
      properties:
        id:
          type: string
          description: Asset group ID.
          examples:
            - group-20260331145705-xxxxx

    UpdateVolceAssetGroupRequest:
      type: object
      additionalProperties: false
      required:
        - id
      anyOf:
        - required:
            - name
        - required:
            - description
      properties:
        id:
          type: string
          description: Asset group ID.
          examples:
            - group-20260331145705-xxxxx
        name:
          type: string
          description: New asset group name. At least one of `name` or `description` is required.
          examples:
            - new-name
        description:
          type: string
          description: New asset group description. At least one of `name` or `description` is required.
          examples:
            - new-description

    CreateVolceAssetAssetRequest:
      type: object
      additionalProperties: false
      required:
        - group_id
        - url
        - asset_type
      properties:
        group_id:
          type: string
          description: ID of the asset group that owns the asset.
          examples:
            - group-20260331145705-xxxxx
        url:
          type: string
          format: uri
          description: Publicly reachable asset URL. Base64 upload is not supported.
          examples:
            - https://example.com/image.jpg
        name:
          type: string
          description: Asset name.
          examples:
            - test-image
        asset_type:
          $ref: "#/components/schemas/VolceAssetAssetType"

    ListVolceAssetAssetsRequest:
      type: object
      additionalProperties: false
      properties:
        filter:
          $ref: "#/components/schemas/VolceAssetAssetFilter"
        page_number:
          type: integer
          minimum: 1
          default: 1
          description: Page number, starting from 1.
        page_size:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
          description: Number of items per page.
        sort_by:
          type: string
          enum:
            - CreateTime
            - UpdateTime
            - GroupId
          description: Sort field.
        sort_order:
          type: string
          enum:
            - Desc
            - Asc
          description: Sort direction.

    VolceAssetAssetFilter:
      type: object
      additionalProperties: false
      properties:
        group_ids:
          type: array
          description: Asset group IDs. Empty means assets under asset groups visible to the current account.
          items:
            type: string
          examples:
            - - group-20260331145705-xxxxx
        group_type:
          allOf:
            - $ref: "#/components/schemas/VolceAssetGroupType"
          default: LivenessFace
          description: Asset group type. Defaults to `LivenessFace`.
        statuses:
          type: array
          description: Asset statuses to include.
          items:
            $ref: "#/components/schemas/VolceAssetAssetStatus"
          examples:
            - - Active
        name:
          type: string
          description: Asset name. Supports fuzzy matching.
          examples:
            - test

    ListVolceAssetAssetsResponse:
      type: object
      additionalProperties: false
      required:
        - items
        - total_count
        - page_number
        - page_size
      properties:
        items:
          type: array
          description: Asset list.
          items:
            $ref: "#/components/schemas/VolceAssetAsset"
        total_count:
          type: integer
          description: Total number of assets that match the filter.
        page_number:
          type: integer
          description: Current page number.
        page_size:
          type: integer
          description: Number of items per page.

    VolceAssetAsset:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - url
        - group_id
        - asset_type
        - status
        - error
        - project_name
        - create_time
        - update_time
      properties:
        id:
          type: string
          description: Asset ID.
          examples:
            - Asset-20260331150000-xxxxx
        name:
          type: string
          description: Asset name.
          examples:
            - test-image
        url:
          type: string
          format: uri
          description: Asset access URL.
          examples:
            - https://example.com/asset-url
        group_id:
          type: string
          description: Asset group ID.
          examples:
            - group-20260331145705-xxxxx
        asset_type:
          $ref: "#/components/schemas/VolceAssetAssetType"
        status:
          $ref: "#/components/schemas/VolceAssetAssetStatus"
        error:
          $ref: "#/components/schemas/VolceAssetProcessingError"
        project_name:
          type: string
          description: Project that owns the resource.
          examples:
            - default
        create_time:
          type: string
          format: date-time
          description: Creation time.
          examples:
            - "2026-03-31T07:00:00Z"
        update_time:
          type: string
          format: date-time
          description: Last update time.
          examples:
            - "2026-03-31T07:00:30Z"

    VolceAssetProcessingError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code returned when asset processing fails.
          examples:
            - ""
        message:
          type: string
          description: Error message returned when asset processing fails.
          examples:
            - ""

    VolceAssetAssetIdRequest:
      type: object
      additionalProperties: false
      required:
        - id
      properties:
        id:
          type: string
          description: Asset ID.
          examples:
            - Asset-20260331150000-xxxxx

    VolceAssetAssetIdResponse:
      type: object
      additionalProperties: false
      required:
        - id
      properties:
        id:
          type: string
          description: Asset ID.
          examples:
            - Asset-20260331150000-xxxxx

    UpdateVolceAssetAssetRequest:
      type: object
      additionalProperties: false
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Asset ID.
          examples:
            - Asset-20260331150000-xxxxx
        name:
          type: string
          description: New asset name.
          examples:
            - new-name

    VolceAssetGroupType:
      type: string
      enum:
        - LivenessFace
        - AIGC
      description: Asset group type.

    VolceAssetAssetType:
      type: string
      enum:
        - Image
        - Video
        - Audio
      description: |
        Asset type.

        Documented constraints:
        - `Image`: jpeg/png/webp/bmp/tiff/gif/heic/heif, aspect ratio `(0.4, 2.5)`,
          width and height `(300, 6000)` px, less than 30 MB.
        - `Video`: mp4/mov, 480p/720p/1080p, duration `[2, 15]` seconds,
          aspect ratio `[0.4, 2.5]`, width and height `[300, 6000]` px, total
          pixels `[409600, 2086876]`, less than 50 MB, FPS `[24, 60]`.
        - `Audio`: wav/mp3, duration `[2, 15]` seconds, less than 15 MB.

    VolceAssetAssetStatus:
      type: string
      enum:
        - Active
        - Processing
        - Failed
      description: Asset processing status.

    EmptyObject:
      type: object
      additionalProperties: false

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ErrorObject"

    ErrorObject:
      type: object
      additionalProperties: false
      required:
        - message
        - type
      properties:
        message:
          type: string
          description: Human-readable error message.
          examples:
            - Invalid param
        type:
          type: string
          description: Error type.
          examples:
            - invalid_request_error
        code:
          type:
            - string
            - "null"
          enum:
            - param_error
            - invalid_messages
            - sensitive_check_error
            - model_error
            - tokens_too_long
            - auth_error
            - timeout
            - rate_limit
            - internal_error
            - model_server_error
            - gateway_timeout_error
            - null
          description: Machine-readable error code, when provided.
        param:
          type:
            - string
            - "null"
          description: Parameter or request ID related to the error, when provided.
