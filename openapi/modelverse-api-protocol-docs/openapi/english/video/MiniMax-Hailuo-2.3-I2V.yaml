openapi: 3.1.0
x-language: en-US
info:
  title: ModelVerse MiniMax/Hailuo-2.3-I2V Video Task API
  version: "1.0.0"
  description: |
    Self-contained OpenAPI 3.1 schema for the ModelVerse MiniMax/Hailuo-2.3
    image-to-video asynchronous task API.

servers:
  - url: https://api.modelverse.cn
    description: ModelVerse API endpoint documented for this model.

tags:
  - name: MiniMax/Hailuo-2.3-I2V
    description: Image-to-video asynchronous task operations for MiniMax/Hailuo-2.3.

paths:
  /v1/tasks/submit:
    post:
      tags:
        - MiniMax/Hailuo-2.3-I2V
      operationId: submitMiniMaxHailuo23I2VTask
      summary: Submit a MiniMax/Hailuo-2.3 image-to-video task
      description: Submit an asynchronous image-to-video generation task.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MiniMaxHailuo23I2VSubmitRequest"
            examples:
              documented:
                summary: Source image-to-video request
                value:
                  model: MiniMax-Hailuo-2.3
                  input:
                    first_frame_image: https://cdn.ucloud.com/prod/2024-09-18-16/user/multi_chat_file/9c0b5c14-ee88-4a5b-b503-4f626f018639.jpeg
                    prompt: A mouse runs toward the camera, smiling and blinking. [推进, 跟随]
                  parameters:
                    duration: 6
                    resolution: 1080P
                    prompt_optimizer: true
                    fast_pretreatment: false
                    aigc_watermark: false
              dataUrlImage:
                summary: Request using a Base64 data URL first frame
                value:
                  model: MiniMax-Hailuo-2.3
                  input:
                    first_frame_image: data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD
                    prompt: A small robot walks through a neon alley. [推进, 上升]
                  parameters:
                    duration: 10
                    resolution: 768P
                    prompt_optimizer: true
                    fast_pretreatment: true
                    aigc_watermark: false
      responses:
        "200":
          description: Task submitted successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiniMaxHailuo23I2VSubmitResponse"
              examples:
                submitted:
                  summary: Submitted task
                  value:
                    output:
                      task_id: "106916112212032"
                    request_id: request_id
        "400":
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiniMaxHailuo23I2VErrorResponse"
              examples:
                paramError:
                  $ref: "#/components/examples/MiniMaxHailuo23I2VParamError"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiniMaxHailuo23I2VErrorResponse"
              examples:
                error:
                  $ref: "#/components/examples/MiniMaxHailuo23I2VParamError"

  /v1/tasks/status:
    get:
      tags:
        - MiniMax/Hailuo-2.3-I2V
      operationId: getMiniMaxHailuo23I2VTaskStatus
      summary: Query a MiniMax/Hailuo-2.3 image-to-video task
      description: Query the status and result URLs for an asynchronous image-to-video task.
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: query
          required: true
          description: Asynchronous task identifier returned by `/v1/tasks/submit`.
          schema:
            type: string
          examples:
            documented:
              summary: Source documentation placeholder
              value: task_id
      responses:
        "200":
          description: Task status response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiniMaxHailuo23I2VStatusResponse"
              examples:
                success:
                  summary: Successful task
                  value:
                    output:
                      task_id: "176843862716480"
                      task_status: Success
                      urls:
                        - https://xxxxx/xxxx.mp4
                      submit_time: 1756959000
                      finish_time: 1756959050
                    usage:
                      duration: 6
                    request_id: ""
                failure:
                  summary: Failed task
                  value:
                    output:
                      task_id: task_id
                      task_status: Failure
                      submit_time: 1756959000
                      finish_time: 1756959019
                      error_message: error_message
                    usage:
                      duration: 6
                    request_id: ""
        "400":
          description: Invalid task identifier or request parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiniMaxHailuo23I2VErrorResponse"
              examples:
                paramError:
                  $ref: "#/components/examples/MiniMaxHailuo23I2VParamError"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiniMaxHailuo23I2VErrorResponse"
              examples:
                error:
                  $ref: "#/components/examples/MiniMaxHailuo23I2VParamError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: "ModelVerse API key sent as `Authorization: Bearer <YOUR_API_KEY>`."

  schemas:
    MiniMaxHailuo23I2VSubmitRequest:
      type: object
      additionalProperties: false
      required:
        - model
        - input
      properties:
        model:
          type: string
          const: MiniMax-Hailuo-2.3
          description: Model name. This schema is pinned to `MiniMax-Hailuo-2.3`.
        input:
          $ref: "#/components/schemas/MiniMaxHailuo23I2VInput"
        parameters:
          $ref: "#/components/schemas/MiniMaxHailuo23I2VParameters"

    MiniMaxHailuo23I2VInput:
      type: object
      additionalProperties: false
      required:
        - first_frame_image
        - prompt
      properties:
        first_frame_image:
          type: string
          description: |
            Video first-frame image. Supports a public URL or a Base64 encoded
            data URL such as `data:image/jpeg;base64,...`. Source image
            requirements: JPG, JPEG, PNG, or WebP; no larger than 20 MB; short
            side greater than 300 px; aspect ratio between 2:5 and 5:2.
          examples:
            - https://cdn.ucloud.com/prod/2024-09-18-16/user/multi_chat_file/9c0b5c14-ee88-4a5b-b503-4f626f018639.jpeg
            - data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD
        prompt:
          type: string
          maxLength: 2000
          description: |
            Text description for the generated video. Camera-control
            instructions may be included in square brackets. Supported
            instructions include [左移], [右移], [左摇], [右摇], [推进],
            [拉远], [上升], [下降], [上摇], [下摇], [变焦推近],
            [变焦拉远], [晃动], [跟随], and [固定].
          examples:
            - A mouse runs toward the camera, smiling and blinking. [推进, 跟随]

    MiniMaxHailuo23I2VParameters:
      type: object
      additionalProperties: false
      properties:
        duration:
          type: integer
          description: |
            Generated video duration in seconds. `6` supports `768P` and
            `1080P`; `10` supports `768P`.
          enum:
            - 6
            - 10
          default: 6
        resolution:
          type: string
          description: |
            Generated video resolution tier. The default is `768P`; `1080P` is
            available only for 6-second tasks.
          enum:
            - 768P
            - 1080P
          default: 768P
        prompt_optimizer:
          type: boolean
          default: true
          description: Whether to automatically optimize the text description.
        fast_pretreatment:
          type: boolean
          default: false
          description: Whether to shorten text optimization latency for MiniMax-Hailuo-2.3.
        aigc_watermark:
          type: boolean
          default: false
          description: Whether to add a watermark to the generated video.

    MiniMaxHailuo23I2VSubmitResponse:
      type: object
      additionalProperties: false
      required:
        - output
        - request_id
      properties:
        output:
          type: object
          additionalProperties: false
          required:
            - task_id
          properties:
            task_id:
              type: string
              description: Unique identifier of the asynchronous task.
        request_id:
          type: string
          description: Unique request identifier.

    MiniMaxHailuo23I2VStatusResponse:
      type: object
      additionalProperties: false
      required:
        - output
        - request_id
      properties:
        output:
          $ref: "#/components/schemas/MiniMaxHailuo23I2VStatusOutput"
        usage:
          $ref: "#/components/schemas/MiniMaxHailuo23I2VUsage"
        request_id:
          type: string
          description: Unique request identifier.

    MiniMaxHailuo23I2VStatusOutput:
      type: object
      additionalProperties: false
      required:
        - task_id
        - task_status
      properties:
        task_id:
          type: string
          description: Unique identifier of the asynchronous task.
        task_status:
          $ref: "#/components/schemas/MiniMaxHailuo23I2VTaskStatus"
        urls:
          type: array
          description: Video result URL list.
          items:
            type: string
            format: uri
        submit_time:
          type: integer
          format: int64
          description: Task submission timestamp.
        finish_time:
          type: integer
          format: int64
          description: Task completion timestamp.
        error_message:
          type: string
          description: Error message returned when the task fails.

    MiniMaxHailuo23I2VTaskStatus:
      type: string
      description: Asynchronous task status.
      enum:
        - Pending
        - Running
        - Success
        - Failure

    MiniMaxHailuo23I2VUsage:
      type: object
      additionalProperties: false
      properties:
        duration:
          type: integer
          description: Generated video duration in seconds.

    MiniMaxHailuo23I2VErrorResponse:
      type: object
      additionalProperties: true
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/MiniMaxHailuo23I2VErrorObject"

    MiniMaxHailuo23I2VErrorObject:
      type: object
      additionalProperties: true
      required:
        - message
        - type
      properties:
        message:
          type: string
          description: Error message.
        type:
          type: string
          description: Error type.
          examples:
            - invalid_request_error
        code:
          type:
            - string
            - "null"
          description: Error code.
          examples:
            - param_error
        param:
          type:
            - string
            - "null"
          description: Related request parameter, if any.

  examples:
    MiniMaxHailuo23I2VParamError:
      summary: Invalid parameter error
      value:
        error:
          message: Invalid param
          type: invalid_request_error
          code: param_error
          param: input.first_frame_image
