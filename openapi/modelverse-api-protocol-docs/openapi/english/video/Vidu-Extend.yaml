openapi: 3.1.0
x-language: en-US
info:
  title: ModelVerse Vidu Extend Video Task API
  version: "1.0.0"
  description: |
    Self-contained OpenAPI 3.1 schema for the ModelVerse Vidu video extend
    asynchronous task API.

servers:
  - url: https://api.modelverse.cn
    description: ModelVerse API endpoint documented for this model.

tags:
  - name: Vidu Extend
    description: Video extension asynchronous task operations for Vidu Extend.

paths:
  /v1/tasks/submit:
    post:
      tags:
        - Vidu Extend
      operationId: submitViduExtendTask
      summary: Submit a Vidu Extend video task
      description: Submit an asynchronous video extension task.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ViduExtendSubmitRequest"
            examples:
              documentedVideoUrl:
                summary: Source video extension request
                value:
                  model: viduq2-turbo
                  input:
                    video_url: https://umodelverse-inference.cn-wlcb.ufileos.com/maxcot-dance.mp4
                    last_frame_url: https://umodelverse-inference.cn-wlcb.ufileos.com/ucloud-maxcot.jpg
                    prompt: Continue the video with smooth camera movement
                  parameters:
                    vidu_type: extend
                    duration: 5
                    resolution: 720p
              base64LastFrame:
                summary: Extension request with a Base64 last-frame reference
                value:
                  model: viduq2-pro
                  input:
                    video_url: https://example.com/source-video.mp4
                    last_frame_url: data:image/png;base64,{base64_encode}
                    prompt: Extend the final action naturally with stable motion.
                  parameters:
                    vidu_type: extend
                    duration: 7
                    resolution: 1080p
      responses:
        "200":
          description: Task submitted successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViduExtendSubmitResponse"
              examples:
                submitted:
                  summary: Submitted task
                  value:
                    output:
                      task_id: task_id
                    request_id: request_id
        "400":
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViduExtendErrorResponse"
              examples:
                paramError:
                  $ref: "#/components/examples/ViduExtendParamError"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViduExtendErrorResponse"
              examples:
                error:
                  $ref: "#/components/examples/ViduExtendParamError"

  /v1/tasks/status:
    get:
      tags:
        - Vidu Extend
      operationId: getViduExtendTaskStatus
      summary: Query Vidu Extend task status
      description: Query the status and result URLs for an asynchronous video extension task.
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: query
          required: true
          description: Asynchronous task identifier returned by `/v1/tasks/submit`.
          schema:
            type: string
          examples:
            placeholder:
              summary: Source documentation placeholder
              value: task_id
      responses:
        "200":
          description: Task status response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViduExtendStatusResponse"
              examples:
                success:
                  summary: Successful task
                  value:
                    output:
                      task_id: task_id
                      task_status: Success
                      urls:
                        - https://xxxxx/xxxx-extended.mp4
                      submit_time: 1756959000
                      finish_time: 1756959050
                    usage:
                      duration: 5
                    request_id: ""
                failure:
                  summary: Failed task
                  value:
                    output:
                      task_id: task_id
                      task_status: Failure
                      submit_time: 1756959000
                      finish_time: 1756959019
                      error_message: error_message
                    usage:
                      duration: 5
                    request_id: ""
        "400":
          description: Invalid task identifier or request parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViduExtendErrorResponse"
              examples:
                paramError:
                  $ref: "#/components/examples/ViduExtendParamError"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViduExtendErrorResponse"
              examples:
                error:
                  $ref: "#/components/examples/ViduExtendParamError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: "ModelVerse API key sent as `Authorization: Bearer <MODELVERSE_API_KEY>`."

  schemas:
    ViduExtendSubmitRequest:
      type: object
      additionalProperties: false
      required:
        - model
        - input
        - parameters
      properties:
        model:
          type: string
          description: |
            Vidu Extend model name. This schema is pinned to the
            `Vidu-Extend` source document and only allows its documented
            video extension model values.
          enum:
            - viduq2-turbo
            - viduq2-pro
        input:
          $ref: "#/components/schemas/ViduExtendInput"
        parameters:
          $ref: "#/components/schemas/ViduExtendParameters"

    ViduExtendInput:
      type: object
      additionalProperties: false
      required:
        - video_url
      properties:
        video_url:
          type: string
          format: uri
          description: |
            Publicly accessible video URL to extend. The source video duration
            must be at least 4 seconds and no more than 1 minute.
          examples:
            - https://umodelverse-inference.cn-wlcb.ufileos.com/maxcot-dance.mp4
        last_frame_url:
          type: string
          description: |
            Last-frame reference image as a URL or Base64-encoded image. The
            image may be png, jpeg, jpg, or webp; its aspect ratio must be
            within the documented 1:4 to 4:1 bounds; it must not exceed 50 MB;
            and Base64-decoded bytes must be less than 10 MB. Base64 values
            must include the content type prefix, for example
            `data:image/png;base64,{base64_encode}`.
          examples:
            - https://umodelverse-inference.cn-wlcb.ufileos.com/ucloud-maxcot.jpg
            - data:image/png;base64,{base64_encode}
        prompt:
          type: string
          description: Text prompt used to control the extended video content.
          examples:
            - Continue the video with smooth camera movement

    ViduExtendParameters:
      type: object
      additionalProperties: false
      required:
        - vidu_type
      properties:
        vidu_type:
          type: string
          const: extend
          description: Vidu interface type. This schema is pinned to `extend`.
        duration:
          type: integer
          minimum: 1
          maximum: 7
          default: 5
          description: Extension duration in seconds.
        resolution:
          type: string
          enum:
            - 540p
            - 720p
            - 1080p
          default: 720p
          description: Extended video resolution.

    ViduExtendSubmitResponse:
      type: object
      additionalProperties: false
      required:
        - output
        - request_id
      properties:
        output:
          $ref: "#/components/schemas/ViduExtendSubmitOutput"
        request_id:
          type: string
          description: Unique request identifier.

    ViduExtendSubmitOutput:
      type: object
      additionalProperties: false
      required:
        - task_id
      properties:
        task_id:
          type: string
          description: Unique identifier of the asynchronous task.

    ViduExtendStatusResponse:
      type: object
      additionalProperties: false
      required:
        - output
        - request_id
      properties:
        output:
          $ref: "#/components/schemas/ViduExtendStatusOutput"
        usage:
          $ref: "#/components/schemas/ViduExtendUsage"
        request_id:
          type: string
          description: Unique request identifier.

    ViduExtendStatusOutput:
      type: object
      additionalProperties: false
      required:
        - task_id
        - task_status
      properties:
        task_id:
          type: string
          description: Unique identifier of the asynchronous task.
        task_status:
          $ref: "#/components/schemas/ViduExtendTaskStatus"
        urls:
          type: array
          description: Video result URL list.
          items:
            type: string
            format: uri
        submit_time:
          type: integer
          format: int64
          description: Task submission timestamp.
        finish_time:
          type: integer
          format: int64
          description: Task completion timestamp.
        error_message:
          type: string
          description: Error message returned when the task fails.

    ViduExtendTaskStatus:
      type: string
      enum:
        - Pending
        - Running
        - Success
        - Failure
      description: Current asynchronous task status.

    ViduExtendUsage:
      type: object
      additionalProperties: false
      properties:
        duration:
          type: integer
          description: Extended video duration in seconds.

    ViduExtendErrorResponse:
      type: object
      additionalProperties: true
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ViduExtendErrorObject"
        request_id:
          type: string
          description: Unique request identifier, if available.

    ViduExtendErrorObject:
      type: object
      additionalProperties: true
      required:
        - message
        - type
      properties:
        message:
          type: string
          description: Error message.
        type:
          type: string
          description: Error type.
          examples:
            - invalid_request_error
        code:
          type:
            - string
            - "null"
          description: Error code.
          examples:
            - param_error
        param:
          type:
            - string
            - "null"
          description: Request parameter related to the error.

  examples:
    ViduExtendParamError:
      summary: Invalid parameter error
      value:
        error:
          message: Invalid param
          type: invalid_request_error
          code: param_error
          param: parameters.duration
        request_id: request_id
